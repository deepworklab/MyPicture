<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 680">
  <!-- DrawIO Style Grid Background -->
  <defs>
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
    <!-- Gradient definitions -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a1c71;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d76d77;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaf7b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deepseekGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#396afc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2948ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Title -->
  <rect x="100" y="20" width="700" height="60" rx="10" ry="10" fill="url(#headerGradient)"/>
  <text x="450" y="60" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="white">推理模型提示词框架: DeepSeek思考过程 + 格式化输出</text>

  <!-- Main Flow Diagram -->
  <rect x="50" y="100" width="800" height="560" rx="10" ry="10" fill="none" stroke="#666666" stroke-width="2"/>
  
  <!-- Task Definition Box -->
  <rect x="100" y="130" width="700" height="70" rx="10" ry="10" fill="#f5f5f5" stroke="#666666" stroke-width="2"/>
  <text x="450" y="160" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">任务定义 (Task Definition)</text>
  <text x="450" y="185" font-family="Arial" font-size="14" text-anchor="middle">明确指定你要模型完成的任务和最终目标</text>
  
  <!-- Input Data Box -->
  <rect x="100" y="220" width="700" height="70" rx="10" ry="10" fill="#e6f3fe" stroke="#6c8ebf" stroke-width="2"/>
  <text x="450" y="250" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">输入数据 (Input Data)</text>
  <text x="450" y="275" font-family="Arial" font-size="14" text-anchor="middle">需要模型处理的原始数据、问题或文本</text>

  <!-- Reasoning Process Section -->
  <rect x="100" y="310" width="700" height="160" rx="10" ry="10" fill="#e6f0ff" stroke="#3366cc" stroke-width="2"/>
  <rect x="100" y="310" width="250" height="40" rx="10" ry="10" fill="url(#deepseekGradient)"/>
  <text x="225" y="335" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">DeepSeek 思考过程</text>
  
  <!-- Reasoning Steps -->
  <rect x="120" y="360" width="660" height="100" rx="5" ry="5" fill="#ffffff" stroke="#3366cc" stroke-width="1"/>
  <text x="150" y="380" font-family="Arial" font-size="14" font-weight="bold">请按照以下步骤思考:</text>
  <text x="150" y="405" font-family="Arial" font-size="14">1. 分解问题 - 将复杂问题拆解为更小的子问题</text>
  <text x="150" y="430" font-family="Arial" font-size="14">2. 深入分析 - 针对每个子问题进行详细推理</text>
  <text x="150" y="455" font-family="Arial" font-size="14">3. 整合结论 - 将各个子问题的结论组合起来</text>
  
  <!-- Structured Output Section -->
  <rect x="100" y="490" width="700" height="160" rx="10" ry="10" fill="#f0f9f0" stroke="#339966" stroke-width="2"/>
  <rect x="100" y="490" width="250" height="40" rx="10" ry="10" fill="url(#outputGradient)"/>
  <text x="225" y="515" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">格式化输出</text>
  
  <!-- Output Format -->
  <rect x="120" y="540" width="660" height="100" rx="5" ry="5" fill="#ffffff" stroke="#339966" stroke-width="1"/>
  <text x="150" y="560" font-family="Arial" font-size="14" font-weight="bold">最终输出格式:</text>
  <text x="150" y="585" font-family="Arial" font-size="14">```json</text>
  <text x="150" y="610" font-family="Arial" font-size="14">{"conclusion": "最终结论", "confidence": 0.95, "reasoning_path": [...], "key_factors": [...]}</text>
  <text x="150" y="635" font-family="Arial" font-size="14">```</text>
  
  <!-- Flow Arrows -->
  <path d="M 450 200 L 450 220" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="450,220 445,210 455,210" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <path d="M 450 290 L 450 310" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="450,310 445,300 455,300" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <path d="M 450 470 L 450 490" fill="none" stroke="#000000" stroke-width="2" stroke-miterlimit="10"/>
  <polygon points="450,490 445,480 455,480" fill="#000000" stroke="#000000" stroke-width="2"/>
  
  <!-- Key Components Sidebar -->
  <rect x="20" y="170" width="60" height="160" rx="5" ry="5" fill="#f5f5f5" stroke="#666666" stroke-width="1"/>
  <text x="50" y="230" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 50 230)">推理组件</text>
  
  <rect x="20" y="380" width="60" height="160" rx="5" ry="5" fill="#f5f5f5" stroke="#666666" stroke-width="1"/>
  <text x="50" y="440" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 50 440)">输出组件</text>
  
  <!-- Example Box -->
  <rect x="820" y="170" width="60" height="420" rx="5" ry="5" fill="#f5f5f5" stroke="#666666" stroke-width="1"/>
  <text x="850" y="380" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(90 850 380)">推理模型提示词框架</text>
  
  <!-- Notes at Bottom -->
  <text x="450" y="670" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">注: 此框架特别适合需要深度分析和结构化输出的复杂推理任务</text>
</svg>
